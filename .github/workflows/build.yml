name: CI

permissions:
  contents: write
  packages: write

env:
  NEXT_TELEMETRY_DISABLED: 1
  IMAGE_NAME: ghcr.io/${{ github.repository }}

on:
  push:
    branches: [main]
  # schedule:
  #  - cron: '5 */3 * * *'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      trigger_deploy: ${{ steps.check_changes.outputs.trigger_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: main

      - name: Fetch blog and news content
        run: |
          rm -rf content/blog content/news
          for type in blog news; do
            git clone --depth 1 --filter=blob:none https://github.com/HITSZ-OpenAuto/hoa-$type temp
            mv temp/$type content/$type
            rm -rf temp
          done

      - name: Clone hoa-major-data
        run: git clone https://github.com/HITSZ-OpenAuto/hoa-major-data

      - name: Fetch repositories in the organization
        run: curl -o repos_list.txt https://raw.githubusercontent.com/HITSZ-OpenAuto/repos-management/refs/heads/main/repos_list.txt

      - name: Download and Setup hoa-backend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo HITSZ-OpenAuto/hoa-backend --pattern "hoa-backend-linux.tar.gz"
          tar -xzf hoa-backend-linux.tar.gz
          chmod +x hoa-backend
          sudo mv hoa-backend /usr/local/bin/
          rm hoa-backend-linux.tar.gz

      - name: Build course pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf content/docs
          hoa-backend --fetch

      - name: Check for changes
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "trigger_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git fetch origin production --depth=1 2>/dev/null || { echo "trigger_deploy=true" >> $GITHUB_OUTPUT; exit 0; }
          mkdir -p /tmp/prod
          git archive origin/production content/ | tar -x -C /tmp/prod
          changed=false
          echo "Checking for changes in content/..."
          while IFS= read -r -d '' file; do
            rel_path="${file#content/}"
            prod_file="/tmp/prod/content/$rel_path"
            if [ ! -f "$prod_file" ]; then
              echo "Added: content/$rel_path"
              changed=true
            elif ! diff -u "$prod_file" "$file" > /tmp/diff_output.txt 2>&1; then
              echo "Modified: content/$rel_path"
              echo "--- Diff ---"
              cat /tmp/diff_output.txt
              echo "------------"
              changed=true
            fi
          done < <(find content/ -type f -print0 2>/dev/null)

          while IFS= read -r -d '' file; do
            rel_path="${file#/tmp/prod/content/}"
            build_file="content/$rel_path"
            if [ ! -f "$build_file" ]; then
              echo "Deleted: content/$rel_path"
              changed=true
            fi
          done < <(find /tmp/prod/content/ -type f -print0 2>/dev/null)

          if [ "$changed" = "true" ]; then
            echo "trigger_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "trigger_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload content artifact
        uses: actions/upload-artifact@v4
        with:
          name: content
          path: content/
          retention-days: 1

  build:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: build
    if: needs.build.outputs.trigger_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: main

      - name: Remove placeholder content
        run: rm -rf content/docs content/blog content/news

      - name: Download content artifact
        uses: actions/download-artifact@v4
        with:
          name: content
          path: content/

      - uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check format
        run: pnpm run fmt:check

      - name: Run knip
        run: pnpm run knip

      - name: Fetch external data
        run: |
          curl -o repos_list.txt https://raw.githubusercontent.com/HITSZ-OpenAuto/repos-management/refs/heads/main/repos_list.txt
          mkdir -p hoa-major-data
          curl -o hoa-major-data/major_mapping.json https://raw.githubusercontent.com/HITSZ-OpenAuto/hoa-major-data/main/major_mapping.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Commit and push to production branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -f content/
          git commit -m "docs: update course pages" || echo "No changes to commit"
          git push origin HEAD:production --force

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy container on VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ github.token }}
          FUMA_GITHUB_API_TOKEN: ${{ secrets.FUMA_GITHUB_API_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_TOKEN,FUMA_GITHUB_API_TOKEN
          script: |
            set -euo pipefail
            image_ref='${{ env.IMAGE_NAME }}:latest'
            container='hoa-fuma'
            port='${{ secrets.VPS_APP_PORT }}'

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker pull "${image_ref}"
            docker rm -f "${container}" 2>/dev/null || true
            docker run -d --name "${container}" --restart unless-stopped -p "${port}:3000" -e GITHUB_TOKEN="${FUMA_GITHUB_API_TOKEN}" "${image_ref}"
