name: Feature Request
description: Suggest an idea for this project.
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees: []
type: feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear and concise description of what the feature is.
      placeholder: Describe the feature...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What problem does this feature solve? Is your feature request related to a problem?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your proposed solution...
    validations:
      required: true
  - type: upload
    id: screenshots
    attributes:
      label: Screenshots or mockups
      description: If applicable, add screenshots or mockups to help explain your feature request.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the feature request here.
